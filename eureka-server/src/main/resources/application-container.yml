eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:${HOSTNAME:localhost}}
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${eureka-pro.eureka.client-username}:${eureka-pro.eureka.client-password}@${EUREKA_PEER_1}/eureka/,http://${eureka-pro.eureka.client-username}:${eureka-pro.eureka.client-password}@${EUREKA_PEER_2}/eureka/

management:
  endpoint:
    health:
      probes:
        enabled: true
