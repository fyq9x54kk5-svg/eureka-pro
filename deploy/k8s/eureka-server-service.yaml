apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: eureka-pro
  labels:
    app: eureka-server
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: eureka-server
  ports:
    - name: http
      port: 8761
      targetPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server-lb
  namespace: eureka-pro
  labels:
    app: eureka-server
spec:
  type: NodePort
  selector:
    app: eureka-server
  ports:
    - name: http
      port: 8761
      targetPort: 8761
      nodePort: 30761
